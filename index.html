<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="icon" href="data:image/svg+xml,<svg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'><text%20y='.9em'%20font-size='90'>⏱️</text></svg>" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Reaction Royale</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body { height:100%; }
  body { font-family:"Arial Black",system-ui,sans-serif; color:#fff; touch-action:manipulation; }
  #stage { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:24px; transition:background .08s; cursor:pointer; }
  .idle { background:radial-gradient(circle at 50% 25%,#241152,#08060f); }
  .wait { background:#c0392b; }
  .go   { background:#15d36b; }
  .result { background:radial-gradient(circle at 50% 25%,#10324a,#08060f); }
  .soon { background:#7a2230; }
  h1 { font-size:30px; margin-bottom:10px; text-shadow:0 0 16px rgba(0,0,0,.4); }
  .big { font-size:64px; line-height:1.05; margin:6px 0; }
  .msg { font-size:20px; max-width:420px; }
  .small { font-size:15px; opacity:.9; margin-top:10px; }
  .challenge { font-size:14px; color:#16f2c8; margin-top:6px; min-height:18px; font-weight:900; letter-spacing:.5px; }
  .sharebtn { margin-top:18px; font-family:inherit; font-weight:900; font-size:16px; padding:12px 20px;
    border:none; border-radius:12px; color:#08060f; background:#fff; cursor:pointer; }
</style>
</head>
<body>
  <div id="stage" class="idle">
    <h1>⏱️ Reaction Royale</h1>
    <div class="big" id="big">TAP TO START</div>
    <div class="msg" id="msg">Wait for green, then tap as fast as you can.</div>
    <div class="small" id="small"></div>
    <div class="challenge" id="ch"></div>
  </div>
<script>
(() => {
  const stage=document.getElementById('stage'), big=document.getElementById('big'),
        msg=document.getElementById('msg'), small=document.getElementById('small'), chEl=document.getElementById('ch');
  let state='idle', t0=0, timer=null, best=+(localStorage.rrBest||0);
  // --- shareable result card + challenge deep-link ---
  const _qs=new URLSearchParams(location.search);
  function _gameURL(p){ return location.origin+location.pathname+(p?('?'+p):''); }
  const _rawB=_qs.get('beat'); const _chBeat=(_rawB&&/^\d+$/.test(_rawB))?+_rawB:0;
  async function shareCard(title,bigTxt,sub,text){
    try{
      const c=document.createElement('canvas'); c.width=c.height=1080; const x=c.getContext('2d');
      const g=x.createLinearGradient(0,0,1080,1080); g.addColorStop(0,'#1a0f3d'); g.addColorStop(1,'#070510'); x.fillStyle=g; x.fillRect(0,0,1080,1080);
      x.fillStyle='rgba(22,242,200,.10)'; x.beginPath(); x.arc(540,430,380,0,7); x.fill(); x.textAlign='center';
      x.fillStyle='#fff'; x.font='bold 66px Arial'; x.fillText(title,540,250);
      x.fillStyle='#16f2c8'; x.font='bold 210px Arial'; x.fillText(bigTxt,540,610);
      x.fillStyle='#ff3df0'; x.font='bold 54px Arial'; x.fillText(sub,540,740);
      x.fillStyle='#c9b8ff'; x.font='bold 44px Arial'; x.fillText('VIBE ARCADE',540,960);
      x.fillStyle='#8a7fb0'; x.font='30px Arial'; x.fillText('64johnlee.github.io/vibe-arcade',540,1012);
      const blob=await new Promise(r=>c.toBlob(r,'image/png'));
      if(!blob) throw new Error('canvas export failed');
      const file=new File([blob],'vibe-arcade.png',{type:'image/png'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){ await navigator.share({files:[file],text}); return; }
      const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download='vibe-arcade.png'; a.click(); setTimeout(()=>URL.revokeObjectURL(u),3000);
      try{ await navigator.clipboard.writeText(text); }catch(_){}
    }catch(_){ try{ await navigator.clipboard.writeText(text); }catch(__){} }
  }
  if(_chBeat){ msg.textContent=`🎯 Friend's time: ${_chBeat} ms — beat it! Tap to start.`; chEl.textContent='🎯 TARGET: '+_chBeat+' ms'; }
  function setClass(c){ stage.className=c; }
  function showBest(){ small.textContent = best?`Best: ${best} ms`:''; }
  showBest();
  function arm(){
    state='wait'; setClass('wait'); big.textContent='WAIT…'; msg.textContent="Don't tap until it turns green"; small.textContent='';
    if(_chBeat) chEl.textContent='🎯 TARGET: '+_chBeat+' ms';
    const delay=1200+Math.random()*2800;
    timer=setTimeout(()=>{ state='go'; setClass('go'); big.textContent='TAP!'; msg.textContent='';
      if(_chBeat) chEl.textContent='🎯 TARGET: '+_chBeat+' ms';
      t0=performance.now(); }, delay);
  }
  function result(ms){
    state='result'; setClass('result'); big.textContent=ms+' ms';
    const tier = ms<200?'⚡ Lightning fingers':ms<300?'🔥 Quick':ms<450?'🙂 Decent':'🐢 Sleepy';
    msg.textContent=tier;
    const beatLine = _chBeat ? (ms<_chBeat ? ' · 🎯 CHALLENGE BEATEN!' : ' · 🎯 missed by '+(ms-_chBeat)+'ms') : '';
    chEl.textContent='';
    if(!best||ms<best){ best=ms; localStorage.rrBest=best; small.innerHTML=`🏆 NEW BEST!${beatLine} &nbsp; <button class="sharebtn" id="sh" aria-label="Share your reaction time">📲 Beat my time</button>`; }
    else small.innerHTML=`Best: ${best} ms${beatLine} &nbsp; <button class="sharebtn" id="sh" aria-label="Share your reaction time">📲 Beat my time</button>`;
    const sh=document.getElementById('sh');
    sh.onclick=(e)=>{ e.stopPropagation(); sh.textContent='…';
      shareCard('REACTION ROYALE', ms+' ms', tier, `I reacted in ${ms}ms ⚡ on Reaction Royale — beat me 👉 ${_gameURL('beat='+ms)}`)
        .then(()=>{ sh.textContent='Shared 📸'; }); };
    big.dataset.ms=ms;
  }
  function tooSoon(){ clearTimeout(timer); state='soon'; setClass('soon'); big.textContent='TOO SOON 🚩'; msg.textContent='Tap to try again'; showBest(); chEl.textContent=_chBeat?'🎯 TARGET: '+_chBeat+' ms':''; }
  stage.addEventListener('pointerdown',(e)=>{
    if(e.target.id==='sh') return;
    if(state==='idle'||state==='result'||state==='soon') return arm();
    if(state==='wait') return tooSoon();
    if(state==='go') return result(Math.round(performance.now()-t0));
  });
})();
</script>
</body>
</html>
